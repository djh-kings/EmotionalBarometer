<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emotional Barometer · A tool to explain our moods</title>
<meta name="description" content="An interactive Emotional Barometer — press the dial or spin the wheel of twenty moods to better understand our inner emotional weather.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;}
  ::selection{background:#cdcabf;}
  @keyframes bm-fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  :root{ --paper:#f4f2ee; }

  body{
    min-height:100vh;width:100%;
    background:#e7e5df;
    display:flex;align-items:center;justify-content:center;
    padding:48px 32px;
    font-family:'Oswald',sans-serif;
  }

  .panel{
    width:600px;max-width:94vw;
    background:var(--paper);border-radius:5px;padding:48px 44px 44px;
    box-shadow:0 1px 0 rgba(255,255,255,.7) inset,0 18px 44px -22px rgba(40,44,48,.45),0 2px 6px rgba(40,44,48,.12);
  }
  .panel__title{text-align:center;font-weight:700;font-size:40px;letter-spacing:.02em;color:#3a4148;line-height:1;}
  .panel__subtitle{text-align:center;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.34em;color:#8a8f8e;margin-top:16px;}

  .wheel-wrap{display:flex;justify-content:center;margin:36px 0 10px;}
  .stage{
    position:relative;
    width:min(460px,80vw);height:min(460px,80vw);
    touch-action:none;user-select:none;cursor:grab;
  }
  .stage.dragging{cursor:grabbing;}

  .pointer{
    position:absolute;top:-6px;left:50%;transform:translateX(-50%);
    width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:30px solid #3a4148;
    z-index:6;filter:drop-shadow(0 2px 2px rgba(40,44,48,.3));
  }
  .rotor{position:absolute;inset:0;will-change:transform;}
  .rotor svg{width:100%;height:100%;display:block;overflow:visible;}

  /* the centre dial */
  .dial{
    position:absolute;left:50%;top:50%;
    width:40%;height:40%;max-width:182px;max-height:182px;
    transform:translate(-50%,-50%);
    border-radius:50%;border:none;z-index:5;cursor:pointer;
    background:var(--paper);
    box-shadow:0 4px 16px rgba(40,44,48,.2),0 0 0 1px rgba(40,44,48,.06);
    display:flex;align-items:center;justify-content:center;padding:0;
    font-family:'Oswald',sans-serif;transition:box-shadow .3s;
  }
  .dial:hover{box-shadow:0 6px 22px rgba(40,44,48,.28),0 0 0 1px rgba(40,44,48,.06);}
  .dial:disabled{cursor:default;}
  .dial__ring{
    width:82%;height:82%;border-radius:50%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    background:#41474d;
    box-shadow:inset 0 2px 6px rgba(255,255,255,.35),inset 0 -3px 8px rgba(0,0,0,.12);
    transition:background .25s ease;
  }
  .dial__word{font-weight:700;font-size:30px;letter-spacing:.02em;line-height:.95;color:#f4f2ee;padding:0 8px;text-wrap:balance;}
  .dial__sub{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.26em;margin-top:8px;color:#f4f2ee;opacity:.7;}

  /* the revealed description */
  .reveal{margin:20px auto 0;max-width:440px;text-align:center;}
  .reveal__rule{width:40px;height:3px;margin:0 auto 16px;}
  .reveal__desc{font-family:'Spectral',Georgia,serif;font-size:19px;line-height:1.6;color:#4c5258;margin:0;text-wrap:pretty;}
  .reveal__counter{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.28em;color:#aeb1ac;margin-top:18px;}

  .idle-hint{text-align:center;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.28em;color:#a7aaa6;margin-top:22px;}

  .panel__credit{
    text-align:center;font-family:'Space Mono',monospace;
    font-size:9.5px;letter-spacing:.3em;color:#c2bfb4;
    margin-top:30px;
  }

  .hidden{display:none;}

  @media (max-width:640px){
    body{padding:24px 12px;}
    .panel{padding:30px 18px 26px;}
    .panel__title{font-size:30px;}
    .panel__subtitle{font-size:11px;letter-spacing:.26em;}
    .wheel-wrap{margin:26px 0 8px;}
    .stage{width:80vw;height:80vw;}
    .reveal__desc{font-size:17px;}
  }
</style>
</head>
<body>

  <div class="panel">
    <div class="panel__title">EMOTIONAL BAROMETER</div>
    <div class="panel__subtitle">A TOOL TO EXPLAIN OUR MOODS</div>

    <div class="wheel-wrap">
      <div class="stage" id="stage">
        <div class="pointer"></div>
        <div class="rotor" id="rotor">
          <svg viewBox="0 0 600 600" id="segSvg">
            <circle cx="300" cy="300" r="252" fill="none" stroke="rgba(40,44,48,.14)" stroke-width="2"></circle>
          </svg>
        </div>
        <button class="dial" id="dial" type="button">
          <div class="dial__ring" id="ring">
            <div class="dial__word" id="word">SPIN</div>
            <div class="dial__sub" id="sub">THE DIAL</div>
          </div>
        </button>
      </div>
    </div>

    <div class="reveal hidden" id="reveal">
      <div class="reveal__rule" id="revealRule"></div>
      <p class="reveal__desc" id="revealDesc"></p>
      <div class="reveal__counter" id="revealCounter"></div>
    </div>

    <div class="idle-hint" id="idleHint">PRESS THE DIAL OR DRAG THE WHEEL TO SPIN</div>

    <div class="panel__credit">DESIGNED BY BARBARA FERRAMOSCA</div>
  </div>

<script>
(function(){
  "use strict";

  var DATA = [
    { n:'HAPPY',        c:'#F2A93B', d:'A light, uncomplicated contentment — one of those rare hours when nothing needs fixing and the present feels entirely enough.' },
    { n:'AWED',         c:'#F0998A', d:'Wonder in the face of something far larger than ourselves; the pleasant smallness of standing before the vast and beautiful.' },
    { n:'NOSTALGIC',    c:'#8FC9E2', d:'A tender ache for a past that glows warmer in memory than it ever quite did in fact.' },
    { n:'ANXIOUS',      c:'#F4DC3C', d:'A restless bracing against dangers we cannot quite name. Everyone carries far more of it than they let on.' },
    { n:'LOVING',       c:'#F3C0D2', d:'An open-hearted warmth toward another, wanting their good almost more keenly than our own.' },
    { n:'DREAMY',       c:'#4FA3D9', d:'Half here and half elsewhere; the mind drifting pleasantly off its leash, unbothered by the clock.' },
    { n:'CONFIDENT',    c:'#EE6F4B', d:'A quiet trust that we can meet whatever is coming — without any need to prove it to a soul.' },
    { n:'GUILTY',       c:'#C9A77C', d:'The uneasy sense of having fallen a little short of the person we had hoped to be.' },
    { n:'SULKY',        c:'#8C9095', d:'Intense anger bound to an intense refusal to say what is wrong — a strange privilege we reserve for those we trust to understand.' },
    { n:'GRATEFUL',     c:'#7FC3DC', d:'Noticing, for once, just how much had to go right for this ordinary moment to exist at all.' },
    { n:'ENVIOUS',      c:'#9CC03A', d:'A sharp wanting, sparked by another’s life — read kindly, it is a map of what we secretly long for.' },
    { n:'SOLITARY',     c:'#E4E1DA', d:'A chosen aloneness; the deep relief of being unobserved and, for a while, answerable to no one.' },
    { n:'OBSESSED',     c:'#F08CA6', d:'A mind circling one person or idea — telling us, in the end, more about ourselves than about them.' },
    { n:'UGLY',         c:'#5C5F63', d:'The days we can hardly bear our own reflection, forgetting that everyone, sometimes, feels exactly this.' },
    { n:'PRACTICAL',    c:'#8FD3C2', d:'Head down, sleeves up: the steadying, underrated satisfaction of simply getting things done.' },
    { n:'WEEPY',        c:'#CDBBA0', d:'Close to tears for no single reason — a softness that has been waiting quietly to be let out.' },
    { n:'SENSUAL',      c:'#B79BC4', d:'Awake to the body and its small pleasures: texture, warmth, taste, the grace of being touched.' },
    { n:'MELANCHOLY',   c:'#9AA7D0', d:'A gentle, unhurried sadness that knows the world is bittersweet — and rather loves it anyway.' },
    { n:'SELF-PITYING', c:'#C5E07A', d:'Quietly convinced the world has been unfair to us in particular; a mood best met with a little humour.' },
    { n:'NEEDY',        c:'#C6BCE0', d:'An unashamed wish to be held and reassured — the brave admission that we cannot do it all alone.' }
  ];

  var COUNT = DATA.length;     // 20
  var STEP  = 360 / COUNT;     // 18 degrees per segment

  // --- geometry / colour helpers ---
  function pt(angDeg, r){
    var a = angDeg * Math.PI / 180;
    return [300 + r * Math.sin(a), 300 - r * Math.cos(a)];
  }
  function lum(hex){
    var m = hex.replace('#','');
    return 0.299*parseInt(m.slice(0,2),16)/255 +
           0.587*parseInt(m.slice(2,4),16)/255 +
           0.114*parseInt(m.slice(4,6),16)/255;
  }
  function ink(hex){ return lum(hex) < 0.55 ? '#f6f4ef' : '#34383c'; }
  function norm(d){ return ((d % 360) + 540) % 360 - 180; }
  function segUnder(rotDeg){ return ((Math.round(-rotDeg / STEP) % COUNT) + COUNT) % COUNT; }

  // --- state ---
  var rotation = 0;        // committed angle
  var cur = 0;             // live angle during drag / animation
  var selectedIndex = -1;
  var spinning = false;
  var down = false, startAng = 0, startRot = 0, moved = false, samples = [];
  var raf = null, fallback = null;

  // --- elements ---
  var stage   = document.getElementById('stage');
  var rotor   = document.getElementById('rotor');
  var segSvg  = document.getElementById('segSvg');
  var dial    = document.getElementById('dial');
  var ring    = document.getElementById('ring');
  var wordEl  = document.getElementById('word');
  var subEl   = document.getElementById('sub');
  var reveal  = document.getElementById('reveal');
  var revealRule = document.getElementById('revealRule');
  var revealDesc = document.getElementById('revealDesc');
  var revealCounter = document.getElementById('revealCounter');
  var idleHint = document.getElementById('idleHint');

  var SVGNS = 'http://www.w3.org/2000/svg';

  // --- build the wheel segments once (no labels — colour only) ---
  function buildWheel(){
    DATA.forEach(function(it, i){
      var a = i * STEP;
      var p1 = pt(a - STEP/2, 252);
      var p2 = pt(a + STEP/2, 252);
      var path = document.createElementNS(SVGNS, 'path');
      path.setAttribute('d', 'M 300 300 L ' + p1[0].toFixed(2) + ' ' + p1[1].toFixed(2) +
                             ' A 252 252 0 0 1 ' + p2[0].toFixed(2) + ' ' + p2[1].toFixed(2) + ' Z');
      path.setAttribute('fill', it.c);
      path.setAttribute('stroke', getComputedStyle(document.documentElement).getPropertyValue('--paper').trim() || '#f4f2ee');
      path.setAttribute('stroke-width', 1.5);
      path.setAttribute('stroke-linejoin', 'round');
      // insert before the ring circle so the outline stays on top
      segSvg.insertBefore(path, segSvg.firstChild);
    });
  }

  // --- rendering ---
  function setRot(rot){
    rotor.style.transform = 'rotate(' + rot + 'deg)';
    paintDial(rot);
  }
  // paint the dial to match the segment currently under the pointer
  function paintDial(rot){
    var c = DATA[segUnder(rot)].c;
    ring.style.background = c;
    wordEl.style.color = ink(c);
    subEl.style.color = ink(c);
  }

  // reflect committed state (idle / selected / spinning) into the UI
  function showState(){
    rotor.style.transform = 'rotate(' + rotation + 'deg)';
    dial.disabled = spinning;

    if (spinning){
      wordEl.textContent = '';
      subEl.textContent = '';
      wordEl.style.fontSize = '30px';
      reveal.classList.add('hidden');
      idleHint.classList.add('hidden');
      return;
    }

    if (selectedIndex >= 0){
      var s = DATA[selectedIndex];
      wordEl.textContent = s.n;
      subEl.textContent = 'TAP TO SPIN';
      wordEl.style.fontSize = s.n.length > 9 ? '20px' : '27px';
      ring.style.background = s.c;
      wordEl.style.color = ink(s.c);
      subEl.style.color = ink(s.c);

      revealRule.style.background = s.c;
      revealDesc.textContent = s.d;
      revealCounter.textContent = 'NO. ' + String(selectedIndex + 1).padStart(2, '0') + ' · OF TWENTY MOODS';
      reveal.classList.remove('hidden');
      idleHint.classList.add('hidden');
      // re-trigger the fade-in each selection
      reveal.style.animation = 'none';
      void reveal.offsetWidth;
      reveal.style.animation = 'bm-fade .5s ease both';
    } else {
      wordEl.textContent = 'SPIN';
      subEl.textContent = 'THE DIAL';
      wordEl.style.fontSize = '30px';
      ring.style.background = '#41474d';
      wordEl.style.color = '#f4f2ee';
      subEl.style.color = '#f4f2ee';
      reveal.classList.add('hidden');
      idleHint.classList.remove('hidden');
    }
  }

  // --- animation control ---
  function stopAnim(){ if (raf) cancelAnimationFrame(raf); raf = null; clearTimeout(fallback); }
  function finish(to, idx){ stopAnim(); cur = to; rotation = to; spinning = false; selectedIndex = idx; showState(); }

  // Physics spin: angular velocity decays under friction, then eases into the
  // nearest detent — so the outcome emerges from the motion and feels natural.
  var K = 0.0019;       // friction (per ms); higher = stops sooner
  var STOP_V = 0.018;   // deg/ms below which we begin the settle
  var SNAP_MS = 460;    // gentle ease into the detent

  function launch(v0){
    stopAnim();
    if (cur == null || isNaN(cur)) cur = rotation || 0;
    var v = v0, phase = 'coast';
    var snapFrom = 0, snapTo = 0, snapT0 = 0;
    var last = performance.now();
    function frame(now){
      var dt = now - last; last = now;
      if (dt > 64) dt = 64;                         // guard tab-stall jumps
      if (phase === 'coast'){
        cur += v * dt;
        v *= Math.exp(-K * dt);
        setRot(cur);
        if (Math.abs(v) < STOP_V){
          phase = 'snap';
          snapFrom = cur;
          snapTo = Math.round(cur / STEP) * STEP;
          // ensure a touch of forward travel so the stop reads as deceleration
          if ((snapTo - cur) * Math.sign(v || 1) < 0) snapTo += STEP * Math.sign(v || 1);
          snapT0 = now;
        }
        raf = requestAnimationFrame(frame);
      } else {
        var t = Math.min(1, (now - snapT0) / SNAP_MS);
        var e = 1 - Math.pow(1 - t, 3);             // easeOutCubic
        setRot(snapFrom + (snapTo - snapFrom) * e);
        if (t < 1){ raf = requestAnimationFrame(frame); }
        else { finish(snapTo, segUnder(snapTo)); }
      }
    }
    raf = requestAnimationFrame(frame);
    clearTimeout(fallback);
    fallback = setTimeout(function(){
      if (spinning){ var base = isNaN(cur) ? 0 : cur; var to = Math.round(base / STEP) * STEP; finish(to, segUnder(to)); }
    }, 9000);
  }

  // direct ease to a known target (used for taps / slow drags)
  function snapBare(to){
    stopAnim();
    var from = cur, t0 = performance.now(), dur = 420;
    function f(now){
      var t = Math.min(1, (now - t0) / dur);
      var e = 1 - Math.pow(1 - t, 3);
      setRot(from + (to - from) * e);
      if (t < 1) raf = requestAnimationFrame(f);
      else finish(to, segUnder(to));
    }
    raf = requestAnimationFrame(f);
    clearTimeout(fallback);
    fallback = setTimeout(function(){ if (spinning) finish(to, segUnder(to)); }, 1200);
  }

  // --- pointer interaction ---
  function getAngle(e){
    var r = stage.getBoundingClientRect();
    return Math.atan2(e.clientX - (r.left + r.width/2), -(e.clientY - (r.top + r.height/2))) * 180 / Math.PI;
  }

  function onDown(e){
    if (spinning) return;
    if (dial.contains(e.target)) return;            // let the dial button handle spin
    stopAnim();
    startAng = getAngle(e);
    startRot = (cur != null) ? cur : rotation;
    moved = false;
    samples = [{ a: 0, t: performance.now() }];
    try { stage.setPointerCapture(e.pointerId); } catch(_){}
    down = true;
    stage.classList.add('dragging');
  }

  function onMove(e){
    if (!down) return;
    var delta = norm(getAngle(e) - startAng);
    if (Math.abs(delta) > 2.5) moved = true;
    cur = startRot + delta;
    setRot(cur);
    samples.push({ a: delta, t: performance.now() });
    while (samples.length > 6) samples.shift();
  }

  function onUp(){
    if (!down) return;
    down = false;
    stage.classList.remove('dragging');

    if (!moved){                                    // a tap — select the segment under the finger
      var local = norm(startAng - cur);
      var idx = ((Math.round(local / STEP) % COUNT) + COUNT) % COUNT;
      var to = cur + norm(-idx * STEP - cur);
      spinning = true; selectedIndex = -1; showState();
      snapBare(to);
      return;
    }
    // angular velocity (deg/ms) from the tail of the drag
    var a = samples[0], b = samples[samples.length - 1];
    var v = (b.t - a.t > 0) ? (b.a - a.a) / (b.t - a.t) : 0;
    v = Math.max(-3.2, Math.min(3.2, v));
    spinning = true; selectedIndex = -1; showState();
    if (Math.abs(v) < 0.05){                         // a slow drag, no real flick
      snapBare(Math.round(cur / STEP) * STEP);
    } else {
      launch(v);
    }
  }

  function spin(){
    if (spinning) return;
    spinning = true; selectedIndex = -1; showState();
    launch(1.5 + Math.random() * 1.1);               // deg/ms — a brisk, varied flick
  }

  stage.addEventListener('pointerdown', onDown);
  stage.addEventListener('pointermove', onMove);
  stage.addEventListener('pointerup', onUp);
  stage.addEventListener('pointerleave', onUp);
  stage.addEventListener('pointercancel', onUp);
  dial.addEventListener('click', spin);

  // --- init ---
  buildWheel();
  showState();
})();
</script>
</body>
</html>
